services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - ${PROVENTL_ENV_FILE:-/opt/proventl/env/proventl.env}
    volumes:
      - /opt/proventl/model:/app/model:ro
      - /opt/proventl/data:/app/data
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  caddy:
    build:
      context: .
      dockerfile: deploy/Dockerfile.caddy
    env_file:
      - ${PROVENTL_ENV_FILE:-/opt/proventl/env/proventl.env}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
